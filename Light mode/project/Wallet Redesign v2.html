<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wallet — Light & Dark</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html, body { height: 100%; overflow: hidden; }
  body { transition: background 0.3s; }
  body[data-theme="dark"] { background: radial-gradient(1400px 800px at 50% -20%, #1a1a30 0%, #05050a 65%); }
  body[data-theme="light"] { background: radial-gradient(1400px 800px at 50% -20%, #F1ECFB 0%, #DDD6E7 70%); }
  body[data-theme="split"] {
    background: linear-gradient(90deg, #05050a 0%, #05050a 49.5%, #2a2040 49.5%, #2a2040 50.5%, #E6E1F0 50.5%, #E6E1F0 100%);
  }
  .stage { width: 100vw; height: 100vh; overflow: auto; padding: 40px 32px 80px; box-sizing: border-box; }
  .stage-inner { margin: 0 auto; display: flex; gap: 36px; flex-wrap: nowrap; align-items: flex-start; }
  .phone-col { display: flex; flex-direction: column; align-items: center; gap: 14px; flex-shrink: 0; }
  .phone-label {
    font-family: "SF Pro Text", system-ui; font-size: 11px;
    direction: rtl; text-align: center; font-weight: 500;
    letter-spacing: 0.04em; text-transform: uppercase;
    color: var(--label-dim, rgba(244,244,248,0.55));
  }
  .phone-label b {
    display: block; font-size: 13px; margin-bottom: 2px;
    text-transform: none; letter-spacing: 0; font-weight: 600;
    color: var(--label-bright, rgba(244,244,248,0.95));
  }
  body[data-theme="light"] { --label-dim: rgba(20,19,42,0.55); --label-bright: rgba(20,19,42,0.95); }
  .split-hdr {
    grid-column: 1 / -1;
    padding: 4px 0 18px;
    display: flex; gap: 0; justify-content: center; width: 100%;
  }
  .focus-wrapper { display: flex; justify-content: center; padding: 20px; min-height: 100vh; align-items: flex-start; }
  .split-group {
    display: flex; flex-direction: column; gap: 18px; padding: 28px 26px;
    border-radius: 32px;
  }
  .split-group.dark { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); }
  .split-group.light { background: rgba(255,255,255,0.5); border: 1px solid rgba(20,10,30,0.06); }
  .split-group h2 {
    margin: 0; font-family: "SF Pro Display", system-ui;
    font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase;
    font-weight: 600;
  }
  .split-group.dark h2 { color: rgba(255,255,255,0.5); }
  .split-group.light h2 { color: rgba(20,10,30,0.5); }
  .split-row { display: flex; gap: 28px; }
</style>
</head>
<body data-theme="dark">
<div id="root"></div>

<script type="text/babel" src="components/icons.jsx"></script>
<script type="text/babel" src="components/shell.jsx"></script>
<script type="text/babel" src="components/home.jsx"></script>
<script type="text/babel" src="components/services.jsx"></script>
<script type="text/babel" src="components/analytics.jsx"></script>
<script type="text/babel" src="components/assets.jsx"></script>
<script type="text/babel" src="components/profile.jsx"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

const TWEAKS = /*EDITMODE-BEGIN*/{
  "view": "compare",
  "theme": "dark",
  "focusScreen": "home",
  "accentHue": 290
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweaks] = useState(TWEAKS);
  const [tweaksOn, setTweaksOn] = useState(false);
  const [focused, setFocused] = useState(TWEAKS.focusScreen);

  useEffect(() => {
    const r = document.documentElement;
    r.style.setProperty('--p-200', `oklch(82% 0.08 ${tweaks.accentHue})`);
    r.style.setProperty('--p-400', `oklch(70% 0.16 ${tweaks.accentHue})`);
    r.style.setProperty('--p-500', `oklch(64% 0.19 ${tweaks.accentHue})`);
    r.style.setProperty('--p-600', `oklch(58% 0.21 ${tweaks.accentHue})`);
    r.style.setProperty('--p-700', `oklch(48% 0.18 ${tweaks.accentHue})`);
    r.style.setProperty('--p-glow', `oklch(64% 0.19 ${tweaks.accentHue} / 0.35)`);
  }, [tweaks.accentHue]);

  useEffect(() => {
    const v = tweaks.view;
    document.body.dataset.theme =
      v === 'compare' ? 'split' :
      v === 'canvas' ? (tweaks.theme || 'dark') :
      (tweaks.theme || 'dark');
  }, [tweaks.view, tweaks.theme]);

  useEffect(() => {
    const onMsg = (e) => {
      if (!e.data || typeof e.data !== 'object') return;
      if (e.data.type === '__activate_edit_mode') setTweaksOn(true);
      if (e.data.type === '__deactivate_edit_mode') setTweaksOn(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({type: '__edit_mode_available'}, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const setTweak = (k, v) => {
    const next = { ...tweaks, [k]: v };
    setTweaks(next);
    window.parent.postMessage({type: '__edit_mode_set_keys', edits: { [k]: v }}, '*');
  };

  const screens = [
    { key: 'home', title: 'الرئيسية', sub: 'Home', Comp: HomeScreen },
    { key: 'services', title: 'الخدمات', sub: 'Services', Comp: ServicesScreen },
    { key: 'analytics', title: 'التحليلات', sub: 'Analytics', Comp: AnalyticsScreen },
    { key: 'assets', title: 'الأصول', sub: 'Assets', Comp: AssetsScreen },
    { key: 'profile', title: 'أنت', sub: 'Profile', Comp: ProfileScreen },
  ];

  const view = tweaks.view || 'compare';

  const renderRow = (theme) => (
    <div className="split-row">
      {screens.map(s => (
        <div className="phone-col" key={s.key}>
          <div className="phone-label"><b>{s.title}</b>{s.sub}</div>
          <Phone screen={s.key} theme={theme} onTab={k => setFocused(k)}>
            <s.Comp tweaks={tweaks} />
          </Phone>
        </div>
      ))}
    </div>
  );

  return (
    <>
      {view === 'compare' && (
        <div className="stage">
          <div style={{ display: 'flex', flexDirection: 'column', gap: 30, width: 'max-content', margin: '0 auto' }}>
            <div className="split-group dark">
              <h2>◾ Dark mode</h2>
              {renderRow('dark')}
            </div>
            <div className="split-group light">
              <h2>◽ Light mode</h2>
              {renderRow('light')}
            </div>
          </div>
        </div>
      )}
      {view === 'canvas' && (
        <div className="stage">
          <div className="stage-inner">
            {screens.map(s => (
              <div className="phone-col" key={s.key}>
                <div className="phone-label"><b>{s.title}</b>{s.sub}</div>
                <Phone screen={s.key} theme={tweaks.theme} onTab={k => setFocused(k)}>
                  <s.Comp tweaks={tweaks} />
                </Phone>
              </div>
            ))}
          </div>
        </div>
      )}
      {view === 'focus' && (
        <div className="focus-wrapper">
          <div className="phone-col">
            <div className="phone-label">
              <b>{screens.find(s => s.key === focused)?.title}</b>
              {screens.find(s => s.key === focused)?.sub}
            </div>
            <Phone screen={focused} theme={tweaks.theme} onTab={setFocused}>
              {(() => {
                const Comp = screens.find(s => s.key === focused)?.Comp;
                return Comp ? <Comp tweaks={tweaks} /> : null;
              })()}
            </Phone>
          </div>
        </div>
      )}

      {tweaksOn && (
        <div className="tweaks-panel">
          <h3>Tweaks</h3>
          <div className="tweak-row">
            <label>View</label>
            <select value={view} onChange={e => setTweak('view', e.target.value)}>
              <option value="compare">Compare (dark + light)</option>
              <option value="canvas">Canvas (one theme)</option>
              <option value="focus">Focus (single screen)</option>
            </select>
          </div>
          {view !== 'compare' && (
            <div className="tweak-row">
              <label>Theme</label>
              <select value={tweaks.theme || 'dark'} onChange={e => setTweak('theme', e.target.value)}>
                <option value="dark">Dark</option>
                <option value="light">Light</option>
              </select>
            </div>
          )}
          {view === 'focus' && (
            <div className="tweak-row">
              <label>Focus screen</label>
              <select value={focused} onChange={e => { setTweak('focusScreen', e.target.value); setFocused(e.target.value); }}>
                {screens.map(s => <option key={s.key} value={s.key}>{s.sub} — {s.title}</option>)}
              </select>
            </div>
          )}
          <div className="tweak-row">
            <label>Accent hue</label>
            <input type="range" min="0" max="360" value={tweaks.accentHue} onChange={e => setTweak('accentHue', parseInt(e.target.value))} />
          </div>
          <div className="tweak-row" style={{ fontSize: 11, color: 'rgba(244,244,248,0.5)', marginBottom: 0 }}>
            Hue: {tweaks.accentHue}° · 290 purple · 230 blue · 170 teal
          </div>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
