<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wallet — Premium Redesign</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html, body { height: 100%; overflow: hidden; }
  body { background: radial-gradient(1200px 700px at 50% -20%, #18182b 0%, #05050a 60%); }
  .stage {
    width: 100vw; height: 100vh;
    overflow: auto;
    display: flex;
    align-items: flex-start;
    padding: 40px 32px 80px;
    box-sizing: border-box;
  }
  .stage-inner {
    margin: 0 auto;
    display: flex;
    gap: 40px;
    flex-wrap: nowrap;
    align-items: flex-start;
  }
  .phone-col {
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    flex-shrink: 0;
  }
  .phone-label {
    font-family: "SF Pro Text", system-ui;
    font-size: 12px;
    color: rgba(244,244,248,0.6);
    direction: rtl;
    text-align: center;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .phone-label b { color: rgba(244,244,248,0.9); display: block; font-size: 13px; margin-bottom: 2px; text-transform: none; letter-spacing: 0; font-weight: 600;}
  .focus-wrapper { display: flex; justify-content: center; padding: 20px; min-height: 100vh; align-items: flex-start; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="components/icons.jsx"></script>
<script type="text/babel" src="components/shell.jsx"></script>
<script type="text/babel" src="components/home.jsx"></script>
<script type="text/babel" src="components/services.jsx"></script>
<script type="text/babel" src="components/analytics.jsx"></script>
<script type="text/babel" src="components/assets.jsx"></script>
<script type="text/babel" src="components/profile.jsx"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React; // scoped to this script only

const TWEAKS = /*EDITMODE-BEGIN*/{
  "view": "canvas",
  "focusScreen": "home",
  "accentHue": 290,
  "showAI": true
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweaks] = useState(TWEAKS);
  const [tweaksOn, setTweaksOn] = useState(false);
  const [focused, setFocused] = useState(TWEAKS.focusScreen);

  useEffect(() => {
    document.documentElement.style.setProperty('--p-200', `oklch(82% 0.08 ${tweaks.accentHue})`);
    document.documentElement.style.setProperty('--p-400', `oklch(70% 0.16 ${tweaks.accentHue})`);
    document.documentElement.style.setProperty('--p-500', `oklch(64% 0.19 ${tweaks.accentHue})`);
    document.documentElement.style.setProperty('--p-600', `oklch(58% 0.21 ${tweaks.accentHue})`);
    document.documentElement.style.setProperty('--p-700', `oklch(48% 0.18 ${tweaks.accentHue})`);
    document.documentElement.style.setProperty('--p-glow', `oklch(64% 0.19 ${tweaks.accentHue} / 0.35)`);
  }, [tweaks.accentHue]);

  useEffect(() => {
    const onMsg = (e) => {
      if (!e.data || typeof e.data !== 'object') return;
      if (e.data.type === '__activate_edit_mode') setTweaksOn(true);
      if (e.data.type === '__deactivate_edit_mode') setTweaksOn(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({type: '__edit_mode_available'}, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const setTweak = (k, v) => {
    const next = { ...tweaks, [k]: v };
    setTweaks(next);
    window.parent.postMessage({type: '__edit_mode_set_keys', edits: { [k]: v }}, '*');
  };

  const screens = [
    { key: 'home', title: 'الرئيسية', sub: 'Home', Comp: HomeScreen },
    { key: 'services', title: 'الخدمات', sub: 'Services', Comp: ServicesScreen },
    { key: 'analytics', title: 'التحليلات', sub: 'Analytics', Comp: AnalyticsScreen },
    { key: 'assets', title: 'الأصول', sub: 'Assets', Comp: AssetsScreen },
    { key: 'profile', title: 'أنت', sub: 'Profile', Comp: ProfileScreen },
  ];

  const view = tweaks.view;
  const focus = focused;

  return (
    <>
      {view === 'canvas' ? (
        <div className="stage">
          <div className="stage-inner">
            {screens.map(s => (
              <div className="phone-col" key={s.key}>
                <div className="phone-label"><b>{s.title}</b>{s.sub}</div>
                <Phone screen={s.key} onTab={k => setFocused(k)}>
                  <s.Comp tweaks={tweaks} />
                </Phone>
              </div>
            ))}
          </div>
        </div>
      ) : (
        <div className="focus-wrapper">
          <div className="phone-col">
            <div className="phone-label">
              <b>{screens.find(s => s.key === focus)?.title}</b>
              {screens.find(s => s.key === focus)?.sub}
            </div>
            <Phone screen={focus} onTab={setFocused}>
              {(() => {
                const Comp = screens.find(s => s.key === focus)?.Comp;
                return Comp ? <Comp tweaks={tweaks} /> : null;
              })()}
            </Phone>
          </div>
        </div>
      )}

      {tweaksOn && (
        <div className="tweaks-panel">
          <h3>Tweaks</h3>
          <div className="tweak-row">
            <label>View</label>
            <select value={view} onChange={e => setTweak('view', e.target.value)}>
              <option value="canvas">Canvas (all screens)</option>
              <option value="focus">Focus (single screen)</option>
            </select>
          </div>
          {view === 'focus' && (
            <div className="tweak-row">
              <label>Focus screen</label>
              <select value={focus} onChange={e => { setTweak('focusScreen', e.target.value); setFocused(e.target.value); }}>
                {screens.map(s => <option key={s.key} value={s.key}>{s.sub} — {s.title}</option>)}
              </select>
            </div>
          )}
          <div className="tweak-row">
            <label>Accent hue</label>
            <input type="range" min="0" max="360" value={tweaks.accentHue} onChange={e => setTweak('accentHue', parseInt(e.target.value))} />
          </div>
          <div className="tweak-row" style={{ fontSize: 11, color: 'rgba(244,244,248,0.5)', marginBottom: 0 }}>
            Hue: {tweaks.accentHue}° · Try 290 (purple), 230 (blue), 170 (teal)
          </div>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
